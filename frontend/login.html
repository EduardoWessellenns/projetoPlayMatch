<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlayMatch - Login</title>
<style>
  * {
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
    margin: 0;
    padding: 0;
  }

  body {
    background-color: #d9dddd;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    background-color: #14264b;
    color: white;
    text-align: center;
    padding: 15px 0;
    font-size: 24px;
    font-weight: bold;
    width: 100%;
  }

  .container {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .form-box {
    background-color: #d9dddd;
    width: 90%;
    max-width: 500px;
    padding: 20px 40px;
  }

  h2 {
    font-size: 36px;
    font-weight: bold;
    margin-bottom: 30px;
    color: #000;
  }

  label {
    display: block;
    font-weight: bold;
    margin-bottom: 5px;
    color: #000;
    font-size: 14px;
  }

  input {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    margin-bottom: 20px;
    font-size: 16px;
    background-color: #fff;
  }

  button {
    width: 100%;
    padding: 15px;
    background-color: #39a94a;
    border: none;
    border-radius: 10px;
    color: white;
    font-size: 22px;
    font-weight: bold;
    cursor: pointer;
    transition: background-color 0.3s;
  }

  button:hover {
    background-color: #2d8d3c;
  }

  button:disabled {
    background-color: #cccccc;
    cursor: not-allowed;
  }

  .message {
    padding: 12px;
    margin: 15px 0;
    border-radius: 8px;
    text-align: center;
    display: none;
    font-weight: bold;
  }

  .success {
    background-color: #d4edda;
    color: #155724;
    border: 1px solid #c3e6cb;
  }

  .error {
    background-color: #f8d7da;
    color: #721c24;
    border: 1px solid #f5c6cb;
  }

  .loading {
    background-color: #fff3cd;
    color: #856404;
    border: 1px solid #ffeaa7;
  }

  .links {
    text-align: center;
    margin-top: 20px;
  }

  .links a {
    color: #14264b;
    text-decoration: none;
    font-weight: bold;
    display: block;
    margin: 8px 0;
  }

  .links a:hover {
    text-decoration: underline;
  }

  .password-container {
    position: relative;
  }

  .toggle-password {
    position: absolute;
    right: 12px;
    top: 12px;
    background: none;
    border: none;
    cursor: pointer;
    font-size: 18px;
    width: auto;
    padding: 0;
    color: #666;
  }

  .toggle-password:hover {
    color: #333;
    background: none;
  }

  .forgot-password {
    text-align: right;
    margin: -10px 0 15px 0;
  }

  .forgot-password a {
    color: #14264b;
    text-decoration: none;
    font-size: 14px;
  }

  .forgot-password a:hover {
    text-decoration: underline;
  }
</style>
</head>
<body>
  <header>PlayMatch</header>

  <div class="container">
    <div class="form-box">
      <h2>Entrar na sua conta</h2>
      
      <div id="message" class="message"></div>
      
      <form id="loginForm">
        <div>
          <label for="email">E-mail</label>
          <input type="email" id="email" placeholder="seu@email.com" required>
        </div>

        <div class="password-container">
          <label for="senha">Senha</label>
          <input type="password" id="senha" placeholder="Digite sua senha" required>
          <button type="button" class="toggle-password" onclick="togglePassword()">👁️</button>
        </div>

        <div class="forgot-password">
          <a href="esqueci-senha.html">Esqueci minha senha</a>
        </div>

        <button type="submit" id="submitBtn">Entrar</button>
      </form>

      <div class="links">
        <a href="cadastro.html">Não tem uma conta? Cadastre-se</a>
        <a href="index.html">Voltar para a página inicial</a>
      </div>
    </div>
  </div>

  <script>

    document.addEventListener('DOMContentLoaded', function() {
  // SEMPRE limpar dados anteriores quando acessar a página de login
  console.log('Limpando sessões anteriores...');
  localStorage.removeItem('fitmatch_token');
  localStorage.removeItem('fitmatch_user');
  
  const form = document.getElementById('loginForm');
  const messageDiv = document.getElementById('message');
  const submitBtn = document.getElementById('submitBtn');
  

});

document.addEventListener('DOMContentLoaded', function() {
  const form = document.getElementById('loginForm');
  const messageDiv = document.getElementById('message');
  const submitBtn = document.getElementById('submitBtn');

  

  // Função para mostrar mensagens
  function showMessage(text, type) {
    messageDiv.textContent = text;
    messageDiv.className = `message ${type}`;
    messageDiv.style.display = 'block';
  }

  // Função para alternar visibilidade da senha
  window.togglePassword = function() {
    const senhaInput = document.getElementById('senha');
    const toggleBtn = document.querySelector('.toggle-password');
    
    if (senhaInput.type === 'password') {
      senhaInput.type = 'text';
      toggleBtn.textContent = '🔒';
    } else {
      senhaInput.type = 'password';
      toggleBtn.textContent = '👁️';
    }
  }

   // Submissão do formulário - VERSÃO COM BANCO
form.addEventListener('submit', async function(e) {
  e.preventDefault();
  
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('senha').value;

  if (!email || !password) {
    showMessage('Por favor, preencha todos os campos.', 'error');
    return;
  }

  submitBtn.disabled = true;
  submitBtn.textContent = 'Entrando...';
  showMessage('Fazendo login...', 'loading');

  try {
    // Fazer requisição para a API de login
    const response = await fetch('http://localhost:3000/api/auth/login', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        email: email,
        password: password
      })
    });

    const result = await response.json();

    if (result.success) {
      showMessage('Login realizado com sucesso! Redirecionando...', 'success');
      
      // Salvar dados do usuário
      localStorage.setItem('fitmatch_token', 'token_' + result.user.id);
      localStorage.setItem('fitmatch_user', JSON.stringify(result.user));
      
      console.log('Usuário logado:', result.user.name);
      
      // Redirecionar
      setTimeout(() => {
        window.location.href = 'index.html';
      }, 1500);

    } else {
      showMessage(result.message, 'error');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Entrar';
    }

  } catch (error) {
    console.error('Erro no login:', error);
    showMessage('Erro de conexão. Verifique o servidor.', 'error');
    submitBtn.disabled = false;
    submitBtn.textContent = 'Entrar';
  }
});
});
  </script>
</body>
</html>
